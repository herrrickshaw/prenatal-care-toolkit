name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install package (with OCR + PDF + ML + dev extras)
        run: pip install -e ".[dev,ocr-tesseract,pdf,ml]"

      - name: Generate sample data
        run: |
          python examples/make_sample_data.py
          python examples/make_sample_formf.py

      - name: Run tests
        run: pytest -q

      - name: CLI smoke test
        run: |
          pctk --version
          pctk backends
          pctk biometry --bpd 46 --hc 170 --ac 150 --fl 30
          pctk planes-demo --n-per-class 12
          pctk health-demo --n 600

  # Separate job: exercise the optional PyTorch CNN backend (heavy; CPU wheels).
  cnn-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + CPU PyTorch
        run: |
          pip install -e ".[ml]"
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Train + eval + predict via the torch CNN backend (1 epoch)
        run: |
          python -c "from pctk.planes import make_synthetic_planes as m; m('synthdata', 12)"
          pctk planes-train synthdata --backend torch --epochs 1 --out cnn.pt
          pctk planes-eval  synthdata --backend torch --model cnn.pt
          IMG=$(ls synthdata/Images/Fetal_brain_* | head -1)
          pctk planes-predict "$IMG" --backend torch --model cnn.pt
