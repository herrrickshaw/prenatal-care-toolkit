name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install package (with OCR + PDF + ML + dev extras)
        run: pip install -e ".[dev,ocr-tesseract,pdf,ml]"

      - name: Generate sample data
        run: |
          python examples/make_sample_data.py
          python examples/make_sample_formf.py

      - name: Run tests
        run: pytest -q

      - name: CLI smoke test
        run: |
          pctk --version
          pctk backends
          pctk biometry --bpd 46 --hc 170 --ac 150 --fl 30
